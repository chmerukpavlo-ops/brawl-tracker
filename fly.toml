# Fly.io deployment config for the Brawl Stars Tracker proxy.
# Created by `flyctl launch`; tweaked for our app:
#   - `fra` (Frankfurt) is closest to the primary UA audience.
#   - The machine sleeps when idle and cold-starts on demand —
#     keeps the free tier comfortable for a side project.
#
# Replace `app` with your own Fly app name once you run `flyctl launch`.

app = "brawl-tracker-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
