name: Security

# Three layers:
#   - npm audit blocks merging on HIGH/CRITICAL CVEs in deps.
#   - CodeQL static analysis catches common vuln patterns in source.
#   - Trivy scans the Docker image (only when a Dockerfile exists).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Monday 06:00 UTC — a week's worth of new advisories surface.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `--omit=dev` because dev tooling occasionally pins old
      # transitive deps that we can't fix and don't ship.
      - name: Audit production deps
        run: npm audit --audit-level=high --omit=dev

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # `security-and-quality` includes the same rules as `security`
          # plus higher-quality hygiene checks (still no false-positive
          # spam in our experience).
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  trivy:
    name: Trivy filesystem
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
