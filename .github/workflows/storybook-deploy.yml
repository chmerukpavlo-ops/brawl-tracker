name: Deploy Storybook

# Publishes the static Storybook build to GitHub Pages every time
# `main` advances. Pull-request previews are the next step on the
# roadmap (Cloudflare Pages already handles the app preview, so we
# could add a sibling job that uploads `storybook-static/` to a
# branch-specific subpath).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploy needs `contents: read` (checkout) + `pages: write`
# (deploy) + `id-token: write` (GitHub's OIDC for Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Storybook deploy at a time. Concurrent runs would just
# race for the Pages slot and the latest one wins anyway.
concurrency:
  group: storybook-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook
        env:
          # Storybook respects `NODE_OPTIONS` for the docs build —
          # 4 GB is plenty for our story count.
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
