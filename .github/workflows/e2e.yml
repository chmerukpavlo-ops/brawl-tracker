name: E2E

# Playwright on its own workflow because (a) it's slower than CI and
# (b) we shard across browsers, so a flake in WebKit shouldn't gate
# the lint/test feedback loop.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: ${{ matrix.browser }} · shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # WebKit covers iOS Safari surface area; Chromium covers
        # Android + desktop Chrome. Firefox is intentionally skipped
        # to halve runner cost — uncomment if you start targeting it.
        browser: [chromium, webkit]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Cache the browser binaries — shaves ~60s off each run.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ matrix.browser }}

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Run e2e
        env:
          CI: "true"
        run: |
          # Map our matrix.browser to the Playwright project names
          # defined in playwright.config.ts.
          if [ "${{ matrix.browser }}" = "chromium" ]; then
            PROJECT="Mobile Chrome"
          else
            PROJECT="Mobile Safari"
          fi
          npx playwright test --project="$PROJECT" \
            --shard=${{ matrix.shard }}/2

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
