# Weekly Dependabot updates. Production deps land as separate PRs so
# each can run through the full CI pipeline; dev-only deps are grouped
# to keep the PR queue manageable.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-patch:
        dependency-type: production
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - automated
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
      - automated
    commit-message:
      prefix: docker
